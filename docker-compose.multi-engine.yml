# CT 400: control plane + 6 libtorrent-движков (b1–b6), отдельный том на движок.
# Запуск: docker compose -f docker-compose.multi-engine.yml up -d --build

x-engine-common: &engine-common
  build:
    context: ./engine
    dockerfile: Dockerfile
  # Запас времени на graceful shutdown: сохранить fastresume/session.state по SIGTERM
  # до того, как Docker пришлёт SIGKILL (по умолчанию всего 10s).
  stop_grace_period: 60s
  environment: &engine-env
    ENGINE_HTTP_PORT: "8081"
    SEEDING_ENGINE_BACKEND: libtorrent
    SEEDING_DATA_ROOT: /data
    SEEDING_LT_STATE_FILE: /data/.state/session.state
    SEEDING_FASTRESUME_DIR: /data/.fastresume
    # Периодическое сохранение состояния (сек) — устойчивость к kill -9/падению.
    SEEDING_FASTRESUME_SAVE_INTERVAL: "300"
    LT_CONNECTIONS_LIMIT: "500"
    LT_ENABLE_UPNP: "0"
    LT_ENABLE_NATPMP: "0"
    # Саморегистрация в оркестраторе (Фаза 4.5). id/порт/префикс выводятся из
    # ENGINE_STORAGE_SUBDIR + LT_LISTEN_INTERFACES + SEEDING_DATA_ROOT.
    SEEDING_ORCHESTRATOR_URL: "http://api:8000"
    SEEDING_ENGINE_REGISTER_KEY: "ct400-engine-register"
    # Аутентификация внутреннего API движка (оркестратор шлёт X-Engine-Token).
    # Тот же токен должен быть у api и queue_worker. Поменяй на свой секрет в проде.
    SEEDING_ENGINE_API_TOKEN: "ct400-engine-api-token"
    # Шифрование внутреннего API (TLS). Сертификаты в ./certs (см. scripts/gen-certs.sh).
    SEEDING_ENGINE_TLS: "1"
    SEEDING_ENGINE_TLS_CERT: /certs/engine.crt
    SEEDING_ENGINE_TLS_KEY: /certs/engine.key
    # CA для проверки другого движка при прямом переносе движок→движок (transport=direct).
    SEEDING_ENGINE_TLS_CA: /certs/ca.crt
    # Структурные (JSON) логи (Фаза 6).
    SEEDING_LOG_JSON: "1"
  healthcheck:
    # Локальный health по https (самопроверка без верификации хоста).
    test:
      [
        "CMD",
        "python",
        "-c",
        "import os,ssl,json,urllib.request; tls=os.getenv('SEEDING_ENGINE_TLS')=='1'; u=('https' if tls else 'http')+'://127.0.0.1:8081/health'; c=ssl._create_unverified_context() if tls else None; b=json.loads(urllib.request.urlopen(u,timeout=5,context=c).read()); assert b.get('backend')=='libtorrent', b",
      ]
    interval: 10s
    timeout: 5s
    retries: 5
    start_period: 30s

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: seeding
      POSTGRES_PASSWORD: seeding
      POSTGRES_DB: seeding
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U seeding -d seeding"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Все libtorrent-движки (b1–b6) вынесены на выделенный сидбокс 192.168.1.171 и
  # регистрируются в оркестраторе динамически (см. docker-compose.engine.yml на хосте).
  # CT400 несёт только control plane (api/queue/web/db/redis) и наблюдаемость.

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://seeding:seeding@db:5432/seeding
      REDIS_URL: redis://redis:6379/0
      ENGINES_CONFIG_FILE: /config/engines.json
      SEEDING_RESTORE_CONCURRENCY: "32"
      # Должен совпадать с SEEDING_ENGINE_REGISTER_KEY движков (Фаза 4.5).
      SEEDING_ENGINE_REGISTER_KEY: "ct400-engine-register"
      # Токен для запросов к внутреннему API движков (должен совпадать с движками).
      SEEDING_ENGINE_API_TOKEN: "ct400-engine-api-token"
      # CA для проверки TLS-сертификатов движков (https URL в engines.json).
      SEEDING_ENGINE_TLS_CA: /certs/ca.crt
      # Наблюдаемость (Фаза 6): структурные логи.
      SEEDING_LOG_JSON: "1"
      # WebSocket (Фаза 7): по умолчанию выключен, текущий SSE/поллинг — fallback.
      SEEDING_WS_ENABLED: ${SEEDING_WS_ENABLED:-0}
    volumes:
      - ./config/engines.ct400.json:/config/engines.json:ro
      - ./certs/ca.crt:/certs/ca.crt:ro
      # Перезапуск компонентов стека из UI («Обслуживание»). Даёт api доступ к Docker
      # демону — только admin-эндпоинты /components/* и allowlist сервисов.
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8000:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health', timeout=5).read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 90s
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  queue_worker:
    build:
      context: .
      dockerfile: queue/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://seeding:seeding@db:5432/seeding
      REDIS_URL: redis://redis:6379/0
      ENGINES_CONFIG_FILE: /config/engines.json
      SEEDING_BULK_CONCURRENCY: "16"
      SEEDING_ENGINE_API_TOKEN: "ct400-engine-api-token"
      SEEDING_ENGINE_TLS_CA: /certs/ca.crt
      SEEDING_LOG_JSON: "1"
    volumes:
      - ./config/engines.ct400.json:/config/engines.json:ro
      - ./certs/ca.crt:/certs/ca.crt:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      api:
        condition: service_healthy

volumes:
  pgdata:

