# Наблюдаемость (Фаза 6): Prometheus + Grafana + системные экспортёры.
# Опциональный оверлей — подключать вместе с основным compose:
#   docker compose -f docker-compose.multi-engine.yml \
#     -f docker-compose.multi-engine.media.yml \
#     -f docker-compose.observability.yml up -d
# Prometheus скрапит api:8000/metrics (приложение), node-exporter (хост) и cadvisor
# (контейнеры). API читает системные ряды из Prometheus и отдаёт их в «Нагрузку системы».
# Доступ к Grafana/Prometheus закрыт из LAN — порты слушают только 127.0.0.1
# (зайти можно по SSH-туннелю: ssh -L 3001:127.0.0.1:3001 ...).

services:
  prometheus:
    image: prom/prometheus:v2.54.1
    restart: unless-stopped
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/alerts.yml:/etc/prometheus/alerts.yml:ro
      - promdata:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
    ports:
      - "127.0.0.1:9090:9090"

  grafana:
    image: grafana/grafana:11.2.0
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafanadata:/var/lib/grafana
    ports:
      - "127.0.0.1:3001:3000"
    depends_on:
      - prometheus

  # Метрики хоста (CT400): CPU, RAM, load, диск, дисковый и сетевой I/O.
  node-exporter:
    image: prom/node-exporter:v1.8.2
    restart: unless-stopped
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --path.rootfs=/rootfs
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    expose:
      - "9100"

  # Метрики по каждому контейнеру (CPU/RAM/блочный и сетевой I/O).
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    restart: unless-stopped
    privileged: true
    command:
      - --docker_only=true
      - --housekeeping_interval=10s
      - --store_container_labels=false
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    devices:
      - /dev/kmsg
    expose:
      - "8080"

volumes:
  promdata:
  grafanadata:
