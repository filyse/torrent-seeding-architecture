server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Docker-резолвер (embedded DNS). Вместе с переменной в proxy_pass это заставляет
    # nginx перечитывать IP апстрима `api` на каждый запрос, а не кэшировать его навсегда
    # при старте — иначе после пересоздания контейнера api получаем 502/обрывы.
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $api_upstream api:8000;

    # WebSocket (Фаза 7): upgrade-проксирование, длинный таймаут, без буферизации.
    location = /api/v1/ws {
        proxy_pass http://$api_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 1h;
        proxy_send_timeout 1h;
    }

    # SSE-поток: без буферизации, длинный таймаут, keep-alive.
    location = /api/v1/stream {
        proxy_pass http://$api_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 1h;
        chunked_transfer_encoding off;
    }

    location /api/ {
        proxy_pass http://$api_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
